<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF6EE"/>
      <stop offset="100%" stop-color="#EDD9B8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Gold border -->
  <rect x="14" y="14" width="1172" height="602" fill="none" stroke="#C9A84C" stroke-width="3"/>
  <rect x="22" y="22" width="1156" height="586" fill="none" stroke="#C9A84C" stroke-width="1" stroke-dasharray="8,5"/>

  <!-- Sparkle stars (background decoration) -->
  <path d="M 90,75 L 92.8,82.8 L 90,90.5 L 87.2,82.8 Z M 76,82.8 L 83.8,82.8 L 90,75 L 90,90.5 L 76,82.8 Z" fill="none"/>
  <!-- Star 1 -->
  <path d="M 88,68 L 90,81 L 88,88 L 86,75 Z M 78,78 L 90,76 L 102,78 L 90,84 Z" fill="#C9A84C" opacity="0.7"/>
  <!-- Star 2 -->
  <path d="M 1110,80 L 1112,90 L 1110,96 L 1108,86 Z M 1101,88 L 1110,86 L 1119,88 L 1110,92 Z" fill="#C9A84C" opacity="0.6"/>
  <!-- Star 3 -->
  <path d="M 1130,200 L 1131.5,207 L 1130,212 L 1128.5,205 Z M 1124,206 L 1130,205 L 1136,206 L 1130,209 Z" fill="#D4B460" opacity="0.65"/>
  <!-- Star 4 -->
  <path d="M 75,380 L 78,394 L 75,403 L 72,389 Z M 63,391 L 75,389 L 87,391 L 75,397 Z" fill="#C9A84C" opacity="0.75"/>
  <!-- Star 5 -->
  <path d="M 1140,440 L 1142,450 L 1140,457 L 1138,447 Z M 1131,448 L 1140,447 L 1149,448 L 1140,452 Z" fill="#C9A84C" opacity="0.6"/>
  <!-- Star 6 -->
  <path d="M 600,38 L 602,47 L 600,53 L 598,44 Z M 591,45 L 600,44 L 609,45 L 600,49 Z" fill="#C9A84C" opacity="0.5"/>

  <!-- Purse illustration (left half) -->
  <svg x="80" y="75" width="390" height="480" viewBox="0 0 400 440">
    <!-- Drop shadow -->
    <rect x="77" y="149" width="260" height="195" rx="12" fill="#A85C0A" opacity="0.22"/>
    <!-- Left handle outline -->
    <path d="M 138,143 C 112,28 200,25 187,143" stroke="#2C1810" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Left handle fill -->
    <path d="M 138,143 C 112,28 200,25 187,143" stroke="#CC6D0D" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Left handle stitching -->
    <path d="M 138,143 C 112,28 200,25 187,143" stroke="#FAF6EE" stroke-width="1.5" fill="none" stroke-dasharray="5,4" stroke-linecap="round"/>
    <!-- Right handle outline -->
    <path d="M 218,143 C 208,25 292,28 268,143" stroke="#2C1810" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Right handle fill -->
    <path d="M 218,143 C 208,25 292,28 268,143" stroke="#CC6D0D" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Right handle stitching -->
    <path d="M 218,143 C 208,25 292,28 268,143" stroke="#FAF6EE" stroke-width="1.5" fill="none" stroke-dasharray="5,4" stroke-linecap="round"/>
    <!-- Bag body -->
    <rect x="71" y="141" width="260" height="195" rx="12" fill="#E8841A" stroke="#2C1810" stroke-width="2.5"/>
    <!-- Bag flap -->
    <rect x="68" y="132" width="266" height="92" rx="10" fill="#CC6D0D" stroke="#2C1810" stroke-width="2.5"/>
    <!-- Flap stitching -->
    <rect x="82" y="146" width="238" height="64" rx="5" fill="none" stroke="#FAF6EE" stroke-width="1.5" stroke-dasharray="6,4"/>
    <!-- Lock shackle -->
    <path d="M 191,180 A 9,9 0 0,1 209,180" stroke="#C9A84C" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Lock body -->
    <rect x="187" y="178" width="26" height="20" rx="4" fill="#C9A84C" stroke="#2C1810" stroke-width="1.2"/>
    <!-- Keyhole -->
    <circle cx="200" cy="187" r="3.5" fill="#7A4A10"/>
    <rect x="198.5" y="187" width="3" height="5" rx="1" fill="#7A4A10"/>
    <!-- Body stitching -->
    <rect x="85" y="242" width="232" height="86" rx="5" fill="none" stroke="#FAF6EE" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.85"/>
    <!-- Handle rings -->
    <ellipse cx="148" cy="143" rx="8" ry="5" fill="#C9A84C" stroke="#2C1810" stroke-width="1"/>
    <ellipse cx="255" cy="143" rx="8" ry="5" fill="#C9A84C" stroke="#2C1810" stroke-width="1"/>
    <!-- Bottom studs -->
    <circle cx="87" cy="328" r="5.5" fill="#C9A84C" stroke="#2C1810" stroke-width="1"/>
    <circle cx="315" cy="328" r="5.5" fill="#C9A84C" stroke="#2C1810" stroke-width="1"/>
    <circle cx="87" cy="150" r="4" fill="#C9A84C" stroke="#2C1810" stroke-width="1"/>
    <circle cx="315" cy="150" r="4" fill="#C9A84C" stroke="#2C1810" stroke-width="1"/>
    <!-- Bow -->
    <path d="M 302,138 C 295,128 283,130 290,137 C 285,130 285,118 292,124 Z" fill="#C9A84C" stroke="#2C1810" stroke-width="1"/>
    <path d="M 302,138 C 309,128 321,130 314,137 C 319,130 319,118 312,124 Z" fill="#C9A84C" stroke="#2C1810" stroke-width="1"/>
    <circle cx="302" cy="137" r="3.5" fill="#C9A84C" stroke="#2C1810" stroke-width="1"/>
  </svg>

  <!-- Vertical divider -->
  <line x1="590" y1="80" x2="590" y2="550" stroke="#EDD9B8" stroke-width="1.5"/>

  <!-- Right: Text content -->
  <!-- Label -->
  <text x="895" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#C9A84C" text-anchor="middle" letter-spacing="5">A HOME FOR INVENTED WORDS</text>

  <!-- Title -->
  <text x="895" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="700" fill="#2C1810" text-anchor="middle">Word Purse</text>

  <!-- Gold rule -->
  <line x1="720" y1="345" x2="1070" y2="345" stroke="#C9A84C" stroke-width="1.5"/>

  <!-- Tagline -->
  <text x="895" y="385" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#6B3A1F" text-anchor="middle" font-style="italic">Part dictionary, part idea archive,</text>
  <text x="895" y="415" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#6B3A1F" text-anchor="middle" font-style="italic">part community bookshelf.</text>

  <!-- URL -->
  <text x="895" y="510" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#C9A84C" text-anchor="middle" letter-spacing="3">www.wordpurse.com</text>
</svg>
